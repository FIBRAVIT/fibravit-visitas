## ⚠️ Aviso importante sobre o plano gratuito do Render:

O plano gratuito "dorme" após 15 minutos sem uso.
Na primeira vez que abrir, pode demorar 30-60 segundos para carregar.
Depois que carregou, funciona normalmente.

**Para evitar isso:** existe um plano pago ($7/mês) que mantém sempre ativo.
Ou posso configurar um "ping automático" gratuito para manter acordado!

